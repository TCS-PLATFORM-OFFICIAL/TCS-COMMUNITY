name: 🚀 Deploy Track Record to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "track-record/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ 1 deployment chạy tại một thời điểm
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (track-record folder)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "track-record"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
